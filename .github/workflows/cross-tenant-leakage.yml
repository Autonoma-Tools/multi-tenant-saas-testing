name: cross-tenant-leakage

# Seed two isolated tenants, run the UI + API + background-job leakage suites on
# every pull request, then tear the tenants down no matter what happened.
on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: cross-tenant-leakage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  isolation:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
      TENANT_USER_PASSWORD: ${{ secrets.TENANT_USER_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Seed two isolated tenants (Acme + Globex)
        run: npm run seed

      - name: API cross-tenant leakage
        run: npm run test:api

      - name: Background-job cross-tenant leakage
        run: npm run test:jobs

      - name: UI cross-tenant leakage
        run: npm run test:e2e

      - name: Tear down tenants
        if: always()
        run: npm run teardown
